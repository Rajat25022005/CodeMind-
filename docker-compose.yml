# CodeMind — Development Docker Compose
# Usage: docker compose up -d

services:
  # Neo4j - Temporal Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: codemind-neo4j
    ports:
      - "7475:7474"   # Browser UI
      - "7688:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-codemind_dev}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Qdrant - Vector Store
  qdrant:
    image: qdrant/qdrant:latest
    container_name: codemind-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codemind-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-codemind_dev}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PYTHONPATH: /app
      LOG_LEVEL: DEBUG
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION_32CHARS!}
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  neo4j_data:
  qdrant_data:
